<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027两轮车CMF趋势白皮书与趋势工具发布会 - 邀请函</title>

    <!-- WeChat / Social Share Cards -->
    <meta property="og:title" content="2027两轮车CMF趋势白皮书与趋势工具发布会邀请函">
    <meta property="og:description" content="COLORO × PPG × 锦湖日丽联合发布 | 6月26日·上海 | 四大趋势主题 · 24个关键趋势色 · 五大趋势信号">
    <meta property="og:image" content="https://dingzhoujia.github.io/cmf-invitation/share-cover-v2.jpg">
    <meta property="og:image:width" content="900">
    <meta property="og:image:height" content="900">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="format-detection" content="telephone=no">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        .loader {
            text-align: center;
            color: rgba(255,255,255,0.7);
        }
        .loader-icon {
            width: 48px; height: 48px;
            border: 2px solid rgba(201,169,110,0.2);
            border-top-color: #c9a96e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        .loader-text {
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(201,169,110,0.7);
        }
        .loader-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
        }
        .fallback-btn {
            display: none;
            margin-top: 24px;
            padding: 10px 28px;
            background: rgba(201,169,110,0.15);
            border: 1px solid rgba(201,169,110,0.4);
            color: #c9a96e;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            letter-spacing: 2px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="loader-icon"></div>
        <div class="loader-text">正在打开邀请函</div>
        <div class="loader-sub">2027 两轮车 CMF 趋势白皮书与趋势工具发布会</div>
        <a class="fallback-btn" id="fallbackBtn" href="https://dingzhoujia.github.io/cmf-invitation/">手动打开</a>
    </div>

    <script>
        // Redirect immediately - og tags are already served to crawlers
        var targetUrl = 'https://dingzhoujia.github.io/cmf-invitation/';

        // Try instant redirect
        window.location.replace(targetUrl);

        // Fallback: show manual button after 2s if redirect didn't work
        setTimeout(function() {
            document.getElementById('fallbackBtn').style.display = 'inline-block';
        }, 2000);
    </script>
</body>
</html>
